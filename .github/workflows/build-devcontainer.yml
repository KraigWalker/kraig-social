name: Build dev container image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tools/devcontainer-image/**
      - .github/workflows/build-devcontainer.yml

concurrency:
  group: devcontainer-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/kraigwalker/kraig-social-devcontainer

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish dev container image
        uses: devcontainers/ci@v0.3
        with:
          configFile: tools/devcontainer-image/devcontainer.json
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: latest,${{ github.sha }}
          cacheFrom: ${{ env.IMAGE_NAME }}:latest
          push: always
